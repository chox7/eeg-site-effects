# Site classification probe on DANN-extracted features (normals only)
# Measures residual site structure in DANN embeddings.
# Switch features_file to _baseline_ or _mtl_ variants as needed.

experiment_name: "dann_site_clf_newlabels"

paths:
  info_file: "data/ELM19/dann/newlabels/ELM19_info_dann_norm_newlabels.csv"
  features_file: "data/ELM19/dann/newlabels/ELM19_features_dann_dann_norm_newlabels.csv"
  results_file: "results/tables/newlabels/dann_site_clf_results.csv"
  pipeline_save_dir: null
  shap_data_save_dir: null

harmonization_methods:
  - raw

catboost_params:
  iterations: 1500
  learning_rate: 0.07
  depth: 5
  l2_leaf_reg: 9
  task_type: "GPU"

cv:
  n_splits: 5
  random_state: 42

data:
  covariates:
    - age
    - gender
