# Site Classification - 02_site_effect
# 5-fold stratified CV for site/hospital classification

experiment_name: "02_site_effect_site_clf"

paths:
  info_file: "data/ELM19/filtered/ELM19_info_filtered_norm.csv"
  features_file: "data/ELM19/filtered/ELM19_features_filtered_norm.csv"
  results_file: "results/tables/02_site_effect/site_clf_results.csv"
  pipeline_save_dir: "models/02_site_effect/site_clf_pipelines"
  shap_data_save_dir: "results/shap_data/02_site_effect/site_clf"

harmonization_methods:
  - raw
  - sitewise
  - combat
  - neurocombat
  - covbat

catboost_params:
  iterations: 1500
  learning_rate: 0.07
  depth: 5
  l2_leaf_reg: 9
  task_type: "GPU"
  max_bin: 32

cv:
  n_splits: 5
  random_state: 42

data:
  covariates:
    - age
    - gender
