# DANN pathology classification on new-label data
# LOSO CV with calibration on DANN-extracted features.
# One config per DANN variant; swap paths.features_file and results_file / tag
# to run the baseline / mtl / dann extractor.
#
# Variants (set via --tag and override --features at CLI, or copy this file):
#   baseline: ELM19_features_dann_baseline_newlabels.csv
#   mtl:      ELM19_features_dann_mtl_newlabels.csv
#   dann:     ELM19_features_dann_dann_newlabels.csv

experiment_name: "dann_patho_clf_newlabels"

paths:
  info_file: "data/ELM19/dann/newlabels/ELM19_info_dann_newlabels.csv"
  features_file: "data/ELM19/dann/newlabels/ELM19_features_dann_dann_newlabels.csv"
  results_file: "results/tables/newlabels/dann_patho_clf_results.csv"
  pipeline_save_dir: "models/newlabels/dann_patho_clf_pipelines"
  shap_data_save_dir: "results/shap_data/newlabels/dann_patho_clf"

harmonization_methods:
  - raw

catboost_params:
  iterations: 1500
  learning_rate: 0.07
  depth: 5
  l2_leaf_reg: 9
  task_type: "GPU"

cv:
  n_splits: 5
  random_state: 42
  k_calibration: 30

data:
  covariates:
    - age
    - gender
