# Site Classification - 04_dann
# Testing DANN-extracted features for site effect analysis

experiment_name: "04_dann_site_clf"

paths:
  info_file: "data/ELM19/filtered/ELM19_info_filtered_norm.csv"
  features_file: "data/ELM19/dann/ELM19_features_dann_final_norm.csv"
  results_file: "results/tables/04_dann/site_clf_results.csv"
  pipeline_save_dir: "models/04_dann/site_clf_pipelines"
  shap_data_save_dir: "results/shap_data/04_dann/site_clf"

harmonization_methods:
  - raw

catboost_params:
  iterations: 1500
  learning_rate: 0.07
  depth: 5
  l2_leaf_reg: 9
  task_type: "GPU"
  max_bin: 32

cv:
  n_splits: 5
  random_state: 42

data:
  covariates:
    - age
    - gender
